id: ws14-high-bandwidth
title: WS14 - High Bandwidth Consumption per Client Detection
description: Detects single clients consuming excessive bandwidth from nginx raw logs
status: production
author: aqsin1337
date: 2026-04-18
tags:
  - attack.impact
  - attack.t1499
severity: medium

splunk_query: >
  index=web_logs sourcetype=_json
  | rex field=line "^(?P<src_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<method>\w+)\s+(?P<uri_path>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status>\d+)\s+(?P<bytes>\d+)"
  | where isnotnull(src_ip) AND isnotnull(bytes)
  | eval bytes=tonumber(bytes)
  | where bytes > 102400
  | bucket _time span=30m
  | stats sum(bytes) as total_bytes, count as dl_count, max(bytes) as max_file, dc(uri_path) as unique_files, values(uri_path) as files by src_ip, _time
  | eval total_mb=round(total_bytes/1024/1024,2)
  | where total_mb > 200
  | eval risk=case(total_mb>2000,"CRITICAL", total_mb>1000,"HIGH", total_mb>200,"MEDIUM", true(),"LOW")
  | eval rule_id="WS14", severity=risk, description=src_ip + " used " + tostring(total_mb) + " MB in 30 min (" + tostring(dl_count) + " requests)"
  | table _time, src_ip, total_mb, dl_count, unique_files, max_file, risk, files, rule_id, description
  | sort - total_mb
