id: ws14-high-bandwidth
title: WS14 - High Bandwidth Consumption per Client Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+)" | where isnotnull(client_ip) | eval bytes=tonumber(bytes) | where bytes > 10240 | bucket _time span=30m | stats sum(bytes) as total_bytes, count as dl_count, max(bytes) as max_file, dc(request_uri) as unique_files, values(request_uri) as files by client_ip, _time | eval total_mb=round(total_bytes/1024/1024,2) | where total_mb > 5 | eval risk=case(total_mb>500,"CRITICAL",total_mb>100,"HIGH",total_mb>5,"MEDIUM",true(),"LOW"), rule_id="WS14", severity=risk, description=client_ip + " used " + tostring(total_mb) + " MB in 30 min (" + tostring(dl_count) + " requests)" | table _time, client_ip, total_mb, dl_count, unique_files, max_file, risk, files, rule_id, description | sort - total_mb
