id: ws13-log-poisoning
title: WS13 - Malformed Request / Path Traversal / Injection Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)" | where isnotnull(client_ip) | where match(request_uri,"%0[aAdD]|%00|%2e%2e|%252e|\.\./|\.\.\\\\|%c0%af") OR match(request_uri,"<script|javascript:|onload=|onerror=|alert\(") OR len(request_uri) > 500 | eval attack_type=case(match(request_uri,"%0[aAdD]"),"CRLF Injection",match(request_uri,"%00"),"Null Byte Injection",match(request_uri,"%2e%2e|%252e|\.\./|\.\.\\\\|%c0%af"),"Path Traversal",match(request_uri,"<script|javascript:|onload=|onerror="),"XSS Attempt",len(request_uri)>500,"Oversized URI",true(),"Malformed Request") | stats count as attack_count, values(request_uri) as samples by client_ip, attack_type | eval rule_id="WS13", severity="HIGH", description="Attack from " + client_ip + ": " + attack_type | table client_ip, attack_type, attack_count, samples, severity, rule_id, description
