title: A08 - Software and Data Integrity Failure Detection
id: a08-integrity-failure
status: production
description: Detects suspicious file upload, deployment and update attempts that could indicate software integrity violations or supply chain attacks
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures/
tags:
  - attack.persistence
  - attack.execution
  - owasp.a08
severity: high
platform: splunk

splunk_query: |
  source="http:web_logs"
  | eval attack_type="A08-Integrity Failure"
  | where match(request_uri, "(?i)(\/upload|\/file-upload|\/import|\/deploy|\/update|\/upgrade|\/install|\/setup|\/migrate|\/restore|\/webhook|\/pipeline|\/ci|\/cd|\/artifact|\/package|\/plugin|\/extension|\/module|\/theme|\/template)")
  | where http_method IN ("POST", "PUT", "PATCH")
  | eval upload_type=case(
      match(request_uri, "(?i)(\/plugin|\/extension|\/module)"), "Plugin/Extension Upload",
      match(request_uri, "(?i)(\/deploy|\/pipeline|\/ci|\/cd)"), "CI/CD Pipeline Abuse",
      match(request_uri, "(?i)(\/upload|\/file-upload)"), "File Upload Attempt",
      match(request_uri, "(?i)(\/webhook)"), "Webhook Abuse",
      match(request_uri, "(?i)(\/update|\/upgrade|\/install)"), "Unauthorized Update",
      true(), "Generic Integrity Violation"
  )
  | eval severity=case(
      upload_type="CI/CD Pipeline Abuse", "CRITICAL",
      upload_type="Plugin/Extension Upload", "HIGH",
      upload_type="Unauthorized Update", "HIGH",
      true(), "MEDIUM"
  )
  | stats count as attempt_count,
          values(request_uri) as targeted_endpoints,
          values(upload_type) as upload_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*20,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, upload_type, attempt_count, risk_score, targeted_endpoints

false_positives:
  - Legitimate software deployments
  - Authorized file uploads
  - CI/CD pipeline activities from known IPs

response:
  - Block source IP immediately
  - Review uploaded files for malicious content
  - Check deployment logs for unauthorized changes
  - Verify integrity of deployed artifacts
  - Rollback if compromise suspected
