title: A09 - Security Logging Failure and Log Injection Detection
id: a09-log-injection
status: production
description: Detects log injection attempts, null byte attacks and attempts to manipulate security logging mechanisms
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/Top10/A09_2021-Security_Logging_and_Monitoring_Failures/
tags:
  - attack.defense_evasion
  - attack.impact
  - owasp.a09
severity: high
platform: splunk

splunk_query: |
  source="http:web_logs"
  | eval attack_type="A09-Log Injection"
  | where match(request_uri, "(?i)(%0a|%0d|%0a%0d|%0d%0a|\r\n|\n|\r|%00|%u0000|\x00|<script|javascript:|vbscript:|data:text\/html|base64,|%3cscript|%3e|&#x0a;|&#x0d;|\\\\n|\\\\r|\\\\t|\\\\0)")
  | eval injection_type=case(
      match(request_uri, "(?i)(%0a|%0d|%0a%0d|&#x0a;|&#x0d;)"), "CRLF Injection",
      match(request_uri, "(?i)(%00|%u0000|\x00)"), "Null Byte Injection",
      match(request_uri, "(?i)(<script|javascript:|vbscript:)"), "Script Injection",
      match(request_uri, "(?i)(base64,|data:text)"), "Base64 Encoded Payload",
      true(), "Generic Log Injection"
  )
  | eval severity=case(
      injection_type="CRLF Injection", "HIGH",
      injection_type="Null Byte Injection", "HIGH",
      injection_type="Script Injection", "CRITICAL",
      injection_type="Base64 Encoded Payload", "HIGH",
      true(), "MEDIUM"
  )
  | stats count as attempt_count,
          values(request_uri) as payloads,
          values(injection_type) as injection_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*15,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, injection_type, attempt_count, risk_score, payloads

false_positives:
  - Legitimate base64 encoded content
  - URL encoded special characters in normal requests

response:
  - Block source IP immediately
  - Review and sanitize log entries
  - Check for log tampering or deletion
  - Implement log integrity monitoring
  - Review SIEM alerts for gaps in logging
