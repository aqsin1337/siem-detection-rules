title: WS06 - Potential Data Exfiltration via Large Response
id: ws06-data-exfiltration
status: production
description: Detects unusually large HTTP responses that may indicate data exfiltration
author: aqsin1337
date: 2026/04/17
modified: 2026/04/17
tags:
  - web_server
  - data_exfil
severity: high
platform: splunk

splunk_query: |
  source="http:web_logs"
  | where bytes_out > 5000000
  | stats sum(bytes_out) as total_bytes, count as requests by client_ip
  | where total_bytes > 20000000
  | eval attack_type="WS06-Data Exfiltration"
  | eval severity="HIGH"
  | eval risk_score=total_bytes / 1000000
  | table _time, client_ip, attack_type, severity, risk_score, total_bytes, requests

false_positives:
  - Large file downloads (PDF, video, backup)

response:
  - Check destination URI and data
