id: ws06-data-exfiltration
title: WS06 - Potential Data Exfiltration via Large HTTP Response
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+)" | where isnotnull(client_ip) | eval bytes=tonumber(bytes) | where bytes > 0 | bucket _time span=10m | stats sum(bytes) as total_bytes, count as req_count, max(bytes) as max_resp, values(request_uri) as paths by client_ip, _time | eval total_mb=round(total_bytes/1024/1024,2) | where total_mb > 10 | eval risk=case(total_mb>500,"CRITICAL",total_mb>100,"HIGH",true(),"MEDIUM"), rule_id="WS06", severity=risk, description=client_ip + " downloaded " + tostring(total_mb) + " MB in 10 min" | table _time, client_ip, total_mb, req_count, max_resp, risk, paths, rule_id, description | sort - total_mb
