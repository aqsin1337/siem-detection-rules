title: A15 - Credential Stuffing Detection
id: a15-credential-stuffing
status: production
description: Detects credential stuffing attacks using leaked username/password combinations against authentication endpoints with high velocity and distributed patterns
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/www-community/attacks/Credential_stuffing
  - https://attack.mitre.org/techniques/T1110/004/
tags:
  - attack.credential_access
  - attack.brute_force
  - mitre.t1110.004
severity: critical
platform: splunk

splunk_query: |
  source="http:web_logs"
  | where match(request_uri, "(?i)(\/login|\/signin|\/wp-login\.php|\/admin\/login|\/user\/login|\/auth|\/api\/login|\/api\/auth|\/oauth\/token|\/api\/token)")
  | where http_method="POST"
  | bucket _time span=10m
  | stats count as attempt_count,
          dc(request_uri) as unique_endpoints,
          values(request_uri) as targeted_endpoints,
          values(status_code) as response_codes,
          dc(status_code) as unique_responses
          by _time, client_ip
  | eval attack_type="A15-Credential Stuffing"
  | eval stuffing_type=case(
      attempt_count >= 100, "High Volume Stuffing",
      attempt_count >= 50, "Medium Volume Stuffing",
      attempt_count >= 20 AND unique_endpoints >= 3, "Distributed Stuffing",
      true(), null()
  )
  | where isnotnull(stuffing_type)
  | eval severity=case(
      stuffing_type="High Volume Stuffing", "CRITICAL",
      stuffing_type="Distributed Stuffing", "HIGH",
      true(), "MEDIUM"
  )
  | eval success_rate=round((mvcount(mvfilter(match(response_codes, "200|201|302"))) / attempt_count) * 100, 2)
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*20,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | eval _time=strftime(_time, "%Y-%m-%d %H:%M:%S")
  | sort -risk_score
  | table _time, client_ip, attack_type, severity, stuffing_type, attempt_count, success_rate, risk_score, targeted_endpoints

false_positives:
  - Legitimate high traffic login pages
  - Authorized load testing
  - Password manager auto-fill

response:
  - Block source IP immediately
  - Force password reset for targeted accounts
  - Enable MFA for all users
  - Implement CAPTCHA on login endpoints
  - Check for successful logins and revoke sessions
  - Notify affected users immediately
