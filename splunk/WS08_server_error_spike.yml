id: ws08-server-error-spike
title: WS08 - Server Error Spike Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)" | where isnotnull(status_code) AND tonumber(status_code)>=500 | bucket _time span=5m | stats count as err_count, dc(client_ip) as unique_ips, dc(request_uri) as unique_paths, values(status_code) as codes by _time | eventstats avg(err_count) as avg_err, stdev(err_count) as stdev_err | eval spike_threshold=avg_err+(2*stdev_err) | where err_count > spike_threshold AND err_count > 5 | eval spike_ratio=round(err_count/avg_err,2), rule_id="WS08", severity="HIGH", description="5xx spike: " + tostring(err_count) + " errors (" + tostring(spike_ratio) + "x above normal)" | table _time, err_count, avg_err, spike_ratio, unique_ips, unique_paths, codes, severity, rule_id, description
