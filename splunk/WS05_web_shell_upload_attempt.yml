id: ws05-web-shell-upload
title: WS05 - Web Shell Upload Attempt Detection
description: Detects POST requests uploading executable files to web server from nginx raw logs
status: production
author: aqsin1337
date: 2026-04-18
tags:
  - attack.persistence
  - attack.t1505.003
severity: critical

splunk_query: >
  index=web_logs sourcetype=_json
  | rex field=line "^(?P<src_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<method>\w+)\s+(?P<uri_path>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status>\d+)"
  | where isnotnull(src_ip) AND method="POST" AND status IN ("200","201")
  | where match(lower(uri_path), "\.(php|phtml|phar|asp|aspx|jsp|cfm|cgi|pl|py|sh|exe)(\?|$)")
     OR match(lower(uri_path), "upload|fileupload|file_upload|shell|cmd|webshell")
  | eval ext=lower(replace(uri_path, ".*\.(\w+)(\?.*)?$", "\1"))
  | eval risk=case(match(ext,"php|asp|aspx|jsp|phar"),"CRITICAL", match(ext,"py|sh|pl|cgi|cfm"),"HIGH", true(),"MEDIUM")
  | stats count as upload_count, values(uri_path) as paths by src_ip, risk
  | eval rule_id="WS05", severity=risk, description="Web shell upload attempt from " + src_ip
  | table src_ip, upload_count, paths, risk, rule_id, description
