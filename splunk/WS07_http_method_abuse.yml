id: ws07-http-method-abuse
title: WS07 - HTTP Method Abuse Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)" | where isnotnull(client_ip) | where http_method IN ("PUT","DELETE","TRACE","CONNECT","PROPFIND","PROPPATCH","MKCOL","COPY","MOVE","LOCK","UNLOCK") | eval risk=case(http_method IN ("PUT","DELETE","TRACE","CONNECT"),"HIGH",true(),"MEDIUM") | stats count as method_count, values(http_method) as methods, dc(request_uri) as unique_targets, values(request_uri) as targets by client_ip, risk | where method_count > 2 | eval rule_id="WS07", severity=risk, description="HTTP method abuse from " + client_ip + ": " + mvjoin(methods,",") | table client_ip, method_count, methods, unique_targets, targets, risk, rule_id, description
