id: ws01-web-server-recon-scan
title: WS01 - Web Server Reconnaissance Scanning Detection
description: Detects high volume of requests from a single IP targeting multiple unique URIs within a short time window, indicating automated reconnaissance or vulnerability scanning activity.
status: production
author: aqsin1337
date: 2025-04-18
tags:
  - attack.reconnaissance
  - attack.t1595
  - web
severity: high

splunk_query: >
  index=* sourcetype IN ("access_combined", "apache_access", "nginx_access", "iis", "web_logs")
  | bucket _time span=5m
  | stats dc(uri_path) as unique_uris, count as total_requests, values(uri_path) as paths by src_ip, _time
  | where unique_uris > 50 AND total_requests > 100
  | eval severity="HIGH", rule_id="WS01", description="Reconnaissance scanning detected from " + src_ip
  | table _time, src_ip, unique_uris, total_requests, severity, rule_id, description
