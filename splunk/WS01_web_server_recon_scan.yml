id: ws01-web-server-recon-scan
title: WS01 - Web Server Reconnaissance Scanning Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)" | where isnotnull(client_ip) | bucket _time span=5m | stats dc(request_uri) as unique_uris, count as total_requests by client_ip, _time | where unique_uris > 30 AND total_requests > 50 | eval rule_id="WS01", severity="HIGH", description="Recon scan from " + client_ip + " - " + tostring(unique_uris) + " unique URIs in 5 min" | table _time, client_ip, unique_uris, total_requests, severity, rule_id, description
