id: ws01-web-server-recon-scan
title: WS01 - Web Server Reconnaissance Scanning Detection
description: Detects high volume of requests from a single IP targeting multiple unique URIs - nginx raw log format
status: production
author: aqsin1337
date: 2026-04-18
tags:
  - attack.reconnaissance
  - attack.t1595
severity: high

splunk_query: >
  index=web_logs sourcetype=_json
  | rex field=line "^(?P<src_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<method>\w+)\s+(?P<uri_path>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status>\d+)\s+(?P<bytes>\d+|-)"
  | where isnotnull(src_ip)
  | bucket _time span=5m
  | stats dc(uri_path) as unique_uris, count as total_requests by src_ip, _time
  | where unique_uris > 30 AND total_requests > 50
  | eval rule_id="WS01", severity="HIGH", description="Recon scan from " + src_ip + " - " + tostring(unique_uris) + " unique URIs in 5 min"
  | table _time, src_ip, unique_uris, total_requests, severity, rule_id, description
