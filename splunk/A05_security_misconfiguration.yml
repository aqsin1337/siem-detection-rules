title: A05 - Security Misconfiguration Detection
id: a05-security-misconfiguration
status: production
description: Detects probing attempts targeting misconfigured services, exposed admin interfaces, debug endpoints and sensitive configuration files
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
tags:
  - attack.discovery
  - attack.reconnaissance
  - owasp.a05
severity: high
platform: splunk

splunk_query: |
  source="http:web_loglari"
  | eval attack_type="A05-Security Misconfiguration"
  | where match(request_uri, "(?i)(\/\.env|\/\.git\/config|\/\.svn\/|\/\.htaccess|\/web\.config|\/phpinfo\.php|\/server-status|\/server-info|\/elmah\.axd|\/trace\.axd|\/wp-config\.php|\/config\.php|\/database\.yml|\/settings\.py|\/application\.properties|\/appsettings\.json|\/\.DS_Store|\/crossdomain\.xml|\/clientaccesspolicy\.xml|\/swagger\/|\/api-docs|\/actuator\/|\/jolokia\/|\/jmx-console|\/admin-console|\/manager\/html)")
  | eval probe_type=case(
      match(request_uri, "(?i)(\/\.env|\/web\.config|\/wp-config\.php|\/database\.yml)"), "Config File Exposure",
      match(request_uri, "(?i)(\/actuator|\/jolokia|\/jmx-console)"), "Management Endpoint Exposure",
      match(request_uri, "(?i)(\/swagger|\/api-docs)"), "API Documentation Exposure",
      match(request_uri, "(?i)(\/phpinfo|\/server-status|\/server-info)"), "Server Info Disclosure",
      match(request_uri, "(?i)(\/\.git|\/\.svn|\/\.htaccess)"), "Source Control Exposure",
      true(), "Generic Misconfiguration Probe"
  )
  | eval severity=case(
      probe_type="Config File Exposure", "CRITICAL",
      probe_type="Management Endpoint Exposure", "HIGH",
      probe_type="Source Control Exposure", "HIGH",
      true(), "MEDIUM"
  )
  | stats count as attempt_count,
          values(request_uri) as probed_paths,
          values(probe_type) as probe_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*15,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, probe_type, attempt_count, risk_score, probed_paths

false_positives:
  - Legitimate admin access from known IPs
  - Security scanners from authorized sources
  - Development environments

response:
  - Block source IP immediately
  - Remove or restrict access to exposed endpoints
  - Review server configuration
  - Implement proper access controls
