id: ws02-high-error-rate
title: WS02 - High Error Rate from Single Client Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)" | where isnotnull(client_ip) AND tonumber(status_code)>=400 | bucket _time span=5m | stats count as error_count, dc(status_code) as error_types, values(status_code) as codes, dc(request_uri) as unique_uris by client_ip, _time | where error_count > 20 | eval severity=case(error_count>100,"CRITICAL",error_count>50,"HIGH",true(),"MEDIUM"), rule_id="WS02", description="High error rate from " + client_ip + ": " + tostring(error_count) + " errors in 5 min" | table _time, client_ip, error_count, error_types, codes, unique_uris, severity, rule_id, description
