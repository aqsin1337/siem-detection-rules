title: A13 - Cross-Site Scripting (XSS) Detection
id: a13-xss-attempt
status: production
description: Detects XSS attempts including reflected, stored and DOM-based XSS payloads with encoded variants
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/www-community/attacks/xss/
  - https://attack.mitre.org/techniques/T1059/007/
tags:
  - attack.execution
  - attack.initial_access
  - mitre.t1059.007
severity: high
platform: splunk

splunk_query: |
  source="http:web_logs"
  | eval attack_type="A13-XSS Attempt"
  | where match(request_uri, "(?i)(<script|<\/script>|javascript:|vbscript:|onload=|onerror=|onclick=|onmouseover=|onfocus=|onblur=|onchange=|onsubmit=|alert\(|confirm\(|prompt\(|document\.cookie|document\.write|window\.location|eval\(|fromCharCode|String\.fromCharCode|atob\(|btoa\(|%3cscript|%3e|%22|%27|&lt;script|&#x3c;script|\\x3cscript|\\u003cscript|<img\s+src|<iframe|<svg\s+onload|<body\s+onload)")
  | eval xss_type=case(
      match(request_uri, "(?i)(document\.cookie|document\.write)"), "Cookie Theft XSS",
      match(request_uri, "(?i)(<iframe|window\.location)"), "Redirect XSS",
      match(request_uri, "(?i)(%3cscript|&#x3c;|\\x3c|\\u003c)"), "Encoded XSS",
      match(request_uri, "(?i)(<svg\s+onload|<img\s+src.*onerror|<body\s+onload)"), "HTML Tag XSS",
      match(request_uri, "(?i)(alert\(|confirm\(|prompt\()"), "Classic XSS Probe",
      true(), "Generic XSS"
  )
  | eval severity=case(
      xss_type="Cookie Theft XSS", "CRITICAL",
      xss_type="Redirect XSS", "HIGH",
      xss_type="Encoded XSS", "HIGH",
      true(), "MEDIUM"
  )
  | stats count as attempt_count,
          values(request_uri) as payloads,
          values(xss_type) as xss_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*15,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, xss_type, attempt_count, risk_score, payloads

false_positives:
  - Legitimate HTML content in forms
  - Security scanners from authorized sources
  - Rich text editors with HTML support

response:
  - Block source IP immediately
  - Review application output encoding
  - Implement Content Security Policy (CSP)
  - Check for stored XSS in database
  - Review session logs for cookie theft
