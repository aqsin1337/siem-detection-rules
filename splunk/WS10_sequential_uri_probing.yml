id: ws10-sequential-uri-probing
title: WS10 - Sequential URI Probing / Directory Enumeration Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)" | where isnotnull(client_ip) | bucket _time span=2m | stats count as total, dc(request_uri) as unique_paths, sum(eval(if(status_code="404",1,0))) as not_found, sum(eval(if(status_code IN ("200","301","302"),1,0))) as found by client_ip, _time | where unique_paths > 10 AND not_found > 8 | eval found_rate=round(found/(found+not_found+0.001)*100,1), rule_id="WS10", severity="HIGH", description="Dir enumeration from " + client_ip + ": " + tostring(unique_paths) + " paths, " + tostring(not_found) + " 404s" | table _time, client_ip, total, unique_paths, found, not_found, found_rate, severity, rule_id, description
