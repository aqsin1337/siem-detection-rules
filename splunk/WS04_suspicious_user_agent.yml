id: ws04-suspicious-user-agent
title: WS04 - Suspicious User-Agent Detection
description: Detects requests using known malicious, scanner, or exploit framework user-agent strings including sqlmap, nikto, nmap, metasploit, and other attack tools.
status: production
author: aqsin1337
date: 2025-04-18
tags:
  - attack.discovery
  - attack.t1595.002
  - web
severity: high

splunk_query: >
  index=* sourcetype IN ("access_combined", "apache_access", "nginx_access", "iis", "web_logs")
  | where match(lower(http_user_agent), "sqlmap|nikto|nmap|masscan|zgrab|nuclei|dirbuster|gobuster|wfuzz|hydra|metasploit|msfconsole|python-requests/2\.[01]|curl/7\.[0-4]|wget/1\.[0-1]|python-urllib|go-http-client/1\.1|libwww-perl|scanbot|openvas|nessus|acunetix|burpsuite|havij|pangolin|w3af")
  | stats count as hit_count, values(uri_path) as targets, values(http_user_agent) as agents, dc(uri_path) as unique_targets by src_ip
  | eval tool_category=case(
      match(lower(mvindex(agents,0)),"sqlmap|havij|pangolin"), "SQL Injection Tool",
      match(lower(mvindex(agents,0)),"nikto|acunetix|w3af|openvas|nessus"), "Web Scanner",
      match(lower(mvindex(agents,0)),"dirbuster|gobuster|wfuzz"), "Directory Brute Force",
      match(lower(mvindex(agents,0)),"metasploit|msfconsole"), "Exploit Framework",
      true(), "Suspicious Tool"
    )
  | eval rule_id="WS04", severity="HIGH", description="Malicious user-agent detected from " + src_ip + " using " + tool_category
  | table src_ip, hit_count, unique_targets, tool_category, agents, severity, rule_id, description
