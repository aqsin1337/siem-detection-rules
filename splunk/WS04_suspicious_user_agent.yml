id: ws04-suspicious-user-agent
title: WS04 - Suspicious User-Agent Detection
status: production
splunk_query: index=web_logs sourcetype=_json | rex field=line "^(?P<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[(?P<req_time>[^\]]+)\]\s+\"(?P<http_method>\w+)\s+(?P<request_uri>\S+)\s+HTTP/[\d\.]+\"\s+(?P<status_code>\d+)\s+(?P<bytes>\d+|-)\s+\"(?P<referer>[^\"]*)\"\s+\"(?P<user_agent>[^\"]+)\"" | where isnotnull(client_ip) | where match(lower(user_agent),"sqlmap|nikto|nmap|masscan|nuclei|dirbuster|gobuster|wfuzz|hydra|metasploit|libwww-perl|acunetix|burpsuite|w3af|openvas|nessus|havij|zgrab|scanbot") | eval tool=case(match(lower(user_agent),"sqlmap|havij"),"SQL Injection Tool",match(lower(user_agent),"nikto|acunetix|w3af|openvas|nessus"),"Web Scanner",match(lower(user_agent),"dirbuster|gobuster|wfuzz"),"Dir Brute Force",match(lower(user_agent),"metasploit|hydra"),"Exploit Tool",true(),"Suspicious Tool") | stats count as hits, dc(request_uri) as targets, values(request_uri) as paths by client_ip, tool, user_agent | eval rule_id="WS04", severity="HIGH", description="Attack tool from " + client_ip + ": " + tool | table client_ip, tool, hits, targets, paths, user_agent, severity, rule_id, description
