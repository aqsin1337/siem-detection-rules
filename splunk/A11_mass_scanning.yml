title: A11 - Mass Scanning and Reconnaissance Detection
id: a11-mass-scanning
status: production
description: Detects automated mass scanning, port scanning and reconnaissance attempts identifying attackers mapping attack surface
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://attack.mitre.org/techniques/T1595/
  - https://owasp.org/www-project-web-security-testing-guide/
tags:
  - attack.reconnaissance
  - attack.discovery
  - mitre.t1595
severity: high
platform: splunk

splunk_query: |
  source="http:web_logs"
  | bucket _time span=1m
  | stats count as request_count,
          dc(request_uri) as unique_paths,
          dc(status_code) as unique_responses,
          values(status_code) as response_codes,
          values(request_uri) as scanned_paths
          by _time, client_ip
  | eval attack_type="A11-Mass Scanning"
  | eval scan_type=case(
      request_count >= 100 AND unique_paths >= 50, "Aggressive Scanner",
      request_count >= 50 AND unique_paths >= 20, "Moderate Scanner",
      request_count >= 20 AND unique_paths >= 10, "Light Scanner",
      true(), null()
  )
  | where isnotnull(scan_type)
  | eval severity=case(
      scan_type="Aggressive Scanner", "CRITICAL",
      scan_type="Moderate Scanner", "HIGH",
      true(), "MEDIUM"
  )
  | eval risk_score=case(
      severity="CRITICAL", request_count*10,
      severity="HIGH", request_count*7,
      true(), request_count*5
  )
  | eval _time=strftime(_time, "%Y-%m-%d %H:%M:%S")
  | sort -risk_score
  | table _time, client_ip, attack_type, severity, scan_type, request_count, unique_paths, risk_score, scanned_paths

false_positives:
  - Search engine crawlers
  - Authorized vulnerability scanners
  - CDN health checks

response:
  - Block source IP at firewall level
  - Implement rate limiting
  - Review scanned paths for vulnerabilities
  - Add IP to threat intelligence feed
