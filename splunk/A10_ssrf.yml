title: A10 - Server Side Request Forgery Detection
id: a10-ssrf
status: production
description: Detects SSRF attempts targeting internal services, cloud metadata endpoints and internal network ranges
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/
tags:
  - attack.initial_access
  - attack.discovery
  - owasp.a10
severity: critical
platform: splunk

splunk_query: |
  source="http:web_logs"
  | eval attack_type="A10-SSRF"
  | where match(request_uri, "(?i)(http:\/\/169\.254\.169\.254|http:\/\/metadata\.google|http:\/\/100\.100\.100\.200|http:\/\/127\.|http:\/\/0\.0\.0\.0|http:\/\/localhost|file:\/\/|dict:\/\/|gopher:\/\/|ftp:\/\/.*@|http:\/\/10\.|http:\/\/172\.1[6-9]\.|http:\/\/172\.2[0-9]\.|http:\/\/172\.3[0-1]\.|http:\/\/192\.168\.|sftp:\/\/|ldap:\/\/|tftp:\/\/|netdoc:\/\/)")
  | eval ssrf_type=case(
      match(request_uri, "(?i)(169\.254\.169\.254|metadata\.google|100\.100\.100\.200)"), "Cloud Metadata SSRF",
      match(request_uri, "(?i)(127\.|localhost|0\.0\.0\.0)"), "Localhost SSRF",
      match(request_uri, "(?i)(10\.|172\.1[6-9]\.|172\.2[0-9]\.|192\.168\.)"), "Internal Network SSRF",
      match(request_uri, "(?i)(file:\/\/|dict:\/\/|gopher:\/\/|ldap:\/\/)"), "Protocol Smuggling SSRF",
      true(), "Generic SSRF"
  )
  | eval severity=case(
      ssrf_type="Cloud Metadata SSRF", "CRITICAL",
      ssrf_type="Protocol Smuggling SSRF", "CRITICAL",
      ssrf_type="Internal Network SSRF", "HIGH",
      true(), "MEDIUM"
  )
  | stats count as attempt_count,
          values(request_uri) as payloads,
          values(ssrf_type) as ssrf_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*20,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, ssrf_type, attempt_count, risk_score, payloads

false_positives:
  - Legitimate internal service calls
  - Load balancer health checks

response:
  - Block source IP immediately
  - Review outbound connections from web server
  - Check cloud metadata access logs
  - Implement network segmentation
  - Whitelist allowed outbound connections
