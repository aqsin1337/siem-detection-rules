title: A06 - Vulnerable Components Detection
id: a06-vulnerable-components
status: production
description: Detects exploitation attempts targeting known vulnerable components including Log4j JNDI injection, Apache Struts, Spring4Shell and other CVEs
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/Top10/A06_2021-Vulnerable_and_Outdated_Components/
  - https://nvd.nist.gov/vuln/detail/CVE-2021-44228
  - https://nvd.nist.gov/vuln/detail/CVE-2017-5638
tags:
  - attack.initial_access
  - attack.execution
  - owasp.a06
  - cve.2021.44228
  - cve.2017.5638
severity: critical
platform: splunk

splunk_query: |
  source="http:web_logs"
  | eval attack_type="A06-Vulnerable Components"
  | where match(request_uri, "(?i)(\$\{jndi:|%24%7Bjndi%3A|%2524%257Bjndi|jndi:ldap|jndi:rmi|jndi:dns|jndi:corba|\/struts\/|\/struts2\/|content-type:.*ognl|\/invoker\/JMXInvokerServlet|\/axis2\/|\/manager\/html|\/jenkins\/|\/actuator\/env|\/actuator\/restart|spring\.cloud\.function|class\.module\.classLoader|\/solr\/admin|\/dubbo\/|WEB-INF\/web\.xml)")
  | eval cve=case(
      match(request_uri, "(?i)(\$\{jndi:|jndi:ldap|jndi:rmi)"), "CVE-2021-44228 Log4Shell",
      match(request_uri, "(?i)(\/struts\/|ognl)"), "CVE-2017-5638 Apache Struts",
      match(request_uri, "(?i)(spring\.cloud\.function|class\.module\.classLoader)"), "CVE-2022-22963 Spring4Shell",
      match(request_uri, "(?i)(\/jenkins\/)"), "Jenkins RCE Attempt",
      match(request_uri, "(?i)(\/solr\/)"), "Apache Solr Exploit",
      true(), "Unknown CVE Exploit"
  )
  | eval severity=case(
      cve="CVE-2021-44228 Log4Shell", "CRITICAL",
      cve="CVE-2022-22963 Spring4Shell", "CRITICAL",
      cve="CVE-2017-5638 Apache Struts", "CRITICAL",
      true(), "HIGH"
  )
  | stats count as attempt_count,
          values(request_uri) as payloads,
          values(cve) as cve_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*20,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, cve, attempt_count, risk_score, payloads

false_positives:
  - Security scanners from authorized sources
  - Penetration testing activities

response:
  - Block source IP immediately
  - Patch affected components urgently
  - Check for successful exploitation
  - Review outbound connections for C2 communication
  - Isolate affected systems if compromise suspected
