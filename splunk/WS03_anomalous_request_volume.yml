id: ws03-anomalous-request-volume
title: WS03 - Anomalous Request Volume per IP Detection
description: Detects IPs sending abnormally high request volumes compared to baseline, indicating DDoS attempts, scraping bots, or automated attack tools.
status: production
author: aqsin1337
date: 2025-04-18
tags:
  - attack.impact
  - attack.t1499
  - web
severity: high

splunk_query: >
  index=* sourcetype IN ("access_combined", "apache_access", "nginx_access", "iis", "web_logs")
  | bucket _time span=1m
  | stats count as req_per_min by src_ip, _time
  | eventstats avg(req_per_min) as avg_req, stdev(req_per_min) as stdev_req by src_ip
  | eval threshold = avg_req + (3 * stdev_req)
  | where req_per_min > threshold AND req_per_min > 200
  | eval anomaly_score=round((req_per_min - avg_req) / stdev_req, 2)
  | eval rule_id="WS03", severity="HIGH", description="Anomalous request volume from " + src_ip + " - " + tostring(req_per_min) + " req/min (score: " + tostring(anomaly_score) + ")"
  | table _time, src_ip, req_per_min, avg_req, threshold, anomaly_score, severity, rule_id, description
