title: A12 - Command Injection Detection
id: a12-command-injection
status: production
description: Detects OS command injection attempts including shell metacharacters, command chaining and remote code execution payloads
author: aqsin1337
date: 2026/04/07
modified: 2026/04/07
references:
  - https://owasp.org/www-community/attacks/Command_Injection
  - https://attack.mitre.org/techniques/T1059/
tags:
  - attack.execution
  - attack.initial_access
  - mitre.t1059
severity: critical
platform: splunk

splunk_query: |
  source="http:web_logs"
  | eval attack_type="A12-Command Injection"
  | where match(request_uri, "(?i)(;ls|;id|;pwd|;whoami|;cat\s|;wget\s|;curl\s|;bash|;sh\s|;python|;perl|;ruby|;php|&&ls|&&id|&&whoami|&&cat|&&wget|&&curl|\|ls|\|id|\|whoami|\|cat|\|wget|\|curl|`ls`|`id`|`whoami`|\$\(ls\)|\$\(id\)|\$\(whoami\)|%3Bls|%3Bid|%7Cid|%7Cls|%26%26id|\/bin\/sh|\/bin\/bash|\/usr\/bin\/python|cmd\.exe|powershell|netcat|nc\s-|\/dev\/tcp)")
  | eval injection_type=case(
      match(request_uri, "(?i)(cmd\.exe|powershell)"), "Windows Command Injection",
      match(request_uri, "(?i)(\/bin\/bash|\/bin\/sh|bash|;sh\s)"), "Unix Shell Injection",
      match(request_uri, "(?i)(wget\s|curl\s|netcat|nc\s-)"), "Remote Download/Connect",
      match(request_uri, "(?i)(`.*`|\$\(.*\))"), "Command Substitution",
      match(request_uri, "(?i)(&&|\|\||\|)"), "Command Chaining",
      true(), "Generic Command Injection"
  )
  | eval severity=case(
      injection_type="Remote Download/Connect", "CRITICAL",
      injection_type="Windows Command Injection", "CRITICAL",
      injection_type="Unix Shell Injection", "CRITICAL",
      injection_type="Command Substitution", "HIGH",
      true(), "HIGH"
  )
  | stats count as attempt_count,
          values(request_uri) as payloads,
          values(injection_type) as injection_types,
          values(status_code) as response_codes
          by client_ip, attack_type, severity
  | eval risk_score=case(
      severity="CRITICAL", attempt_count*20,
      severity="HIGH", attempt_count*10,
      true(), attempt_count*5
  )
  | sort -risk_score
  | table client_ip, attack_type, severity, injection_type, attempt_count, risk_score, payloads

false_positives:
  - Legitimate shell scripts via API
  - Authorized penetration testing

response:
  - Block source IP immediately
  - Check system logs for command execution
  - Review running processes for anomalies
  - Check for backdoors or reverse shells
  - Isolate system if compromise suspected
