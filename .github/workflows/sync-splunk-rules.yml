name: Sync Splunk Rules from GitHub

on:
  push:
    paths:
      - 'splunk/WS*.yml'
  workflow_dispatch:

jobs:
  sync-to-splunk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync Rules to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          python - << 'EOF'
import os, yaml, requests, glob
from requests.auth import HTTPBasicAuth

host = os.getenv('SPLUNK_HOST')
user = os.getenv('SPLUNK_USERNAME')
pwd = os.getenv('SPLUNK_PASSWORD')

if not all([host, user, pwd]):
    print("❌ Secrets tapılmadı!")
    exit(1)

auth = HTTPBasicAuth(user, pwd)
base_url = f"https://{host}/servicesNS/nobody/search"

files = glob.glob('splunk/WS*.yml')

for filepath in files:
    with open(filepath, 'r', encoding='utf-8') as f:
        rule = yaml.safe_load(f)

    if not rule or 'id' not in rule or 'splunk_query' not in rule:
        print(f"⚠️ Skipping {filepath}")
        continue

    alert_id = rule['id']
    title = rule.get('title', alert_id)
    search = rule['splunk_query'].strip()

    if not search:
        print(f"⚠️ No query in {title}")
        continue

    payload = {
        'name': alert_id,
        'search': search,
        'description': f"GitHub Auto Sync - {title}",
        'cron_schedule': '*/10 * * * *',
        'dispatch.earliest_time': '-60m',
        'dispatch.latest_time': 'now',
        'is_scheduled': '1',
        'alert.track': '1',
        'alert.condition': 'number of results > 0',
        'disabled': '0'
    }

    r = requests.post(f"{base_url}/saved/searches/{alert_id}", auth=auth, data=payload, verify=False)

    if r.status_code == 404:
        r = requests.post(f"{base_url}/saved/searches", auth=auth, data=payload, verify=False)

    if r.status_code in (200, 201):
        print(f"✅ UĞURLU: {title}")
    else:
        print(f"❌ XƏTA: {title} | Status: {r.status_code}")
EOF
