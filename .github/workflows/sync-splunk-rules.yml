name: Sync Splunk Rules from GitHub

on:
  push:
    paths:
      - 'splunk/WS*.yml'
  workflow_dispatch:

jobs:
  sync-to-splunk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync Rules to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          python - << 'EOF'
import os
import yaml
import requests
import glob
import sys
from requests.auth import HTTPBasicAuth

# ====================== KONFIGURASİYA ======================
host = os.getenv('SPLUNK_HOST')
user = os.getenv('SPLUNK_USERNAME')
pwd = os.getenv('SPLUNK_PASSWORD')

# Əgər Splunk-da konkret app-də yaratmaq istəyirsənsə, dəyişdir (məsələn: "search" və ya "SIEM")
APP_CONTEXT = "search"        # "nobody/search" və ya öz app adın

if not all([host, user, pwd]):
    print("❌ XƏTA: SPLUNK_HOST, SPLUNK_USERNAME və ya SPLUNK_PASSWORD secret-ləri tapılmadı!")
    sys.exit(1)

auth = HTTPBasicAuth(user, pwd)
base_url = f"https://{host}/servicesNS/nobody/{APP_CONTEXT}"

files = glob.glob('splunk/WS*.yml')
print(f"✅ Tapılan rule fayl sayı: {len(files)}\n")

success_count = 0
failed_count = 0

for filepath in files:
    try:
        with open(filepath, 'r', encoding='utf-8') as f:
            rule = yaml.safe_load(f)

        if not rule or 'id' not in rule or 'splunk_query' not in rule:
            print(f"⚠️ Atlanır (id və ya splunk_query yoxdur): {filepath}")
            continue

        alert_id = str(rule['id']).strip()
        title = rule.get('title', alert_id)
        search_query = str(rule['splunk_query']).strip()

        if not search_query:
            print(f"⚠️ Query boşdur, atlanır: {title}")
            continue

        payload = {
            'name': alert_id,
            'search': search_query,
            'description': f"GitHub Auto Sync - {title}",
            'cron_schedule': '*/10 * * * *',
            'dispatch.earliest_time': '-60m',
            'dispatch.latest_time': 'now',
            'is_scheduled': '1',
            'alert.track': '1',
            'alert.condition': 'number of results > 0',
            'disabled': '0',
            'alert.suppress': '0',
            'action.email': '0'                    # email action istəmirsinizsə
        }

        print(f"🔄 İşlənir: {title} (ID: {alert_id})")

        # 1. Update cəhdi
        update_url = f"{base_url}/saved/searches/{alert_id}"
        r = requests.post(update_url, auth=auth, data=payload, verify=False, timeout=30)

        if r.status_code in (200, 201):
            print(f"✅ UĞURLU (update): {title}\n")
            success_count += 1
            continue

        # 2. Update alınmadısa → Create et
        print(f"   Update alınmadı ({r.status_code}), create cəhd edilir...")
        create_url = f"{base_url}/saved/searches"
        r = requests.post(create_url, auth=auth, data=payload, verify=False, timeout=30)

        if r.status_code in (200, 201):
            print(f"✅ UĞURLU (create): {title}\n")
            success_count += 1
        else:
            print(f"❌ XƏTA: {title}")
            print(f"   Status: {r.status_code}")
            print(f"   Cavab: {r.text[:700]}\n")
            failed_count += 1

    except Exception as e:
        print(f"❌ Python xətası {filepath} faylında: {e}\n")
        failed_count += 1

print("="*60)
print(f"🎯 NƏTİCƏ: {success_count} uğurlu, {failed_count} xətalı")
if failed_count == 0:
    print("✅ Bütün rule-lar uğurla sinxronlaşdırıldı!")
else:
    print("⚠️ Bəzi rule-larda xəta var.")
EOF
