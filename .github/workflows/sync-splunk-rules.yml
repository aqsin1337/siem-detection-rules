name: Sync Splunk Rules from GitHub (API)

on:
  push:
    paths:
      - 'splunk/*.yml'
  workflow_dispatch:

jobs:
  sync-to-splunk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync Rules to Splunk via REST API
        env:
          SPLUNK_HOST: ${{ secrets.16.16.99.235:8089 }}      # məs: 16.16.99.235:8089
          SPLUNK_USERNAME: ${{ secrets.aqsin }}
          SPLUNK_PASSWORD: ${{ secrets.miriSalam123aaa }}
        run: |
          python - << 'PYTHON'
          import os, yaml, requests, glob
          from requests.auth import HTTPBasicAuth

          host = os.getenv('SPLUNK_HOST')
          user = os.getenv('SPLUNK_USERNAME')
          pwd  = os.getenv('SPLUNK_PASSWORD')
          auth = HTTPBasicAuth(user, pwd)
          base_url = f"https://{host}/servicesNS/nobody/search"

          files = glob.glob('splunk/WS*.yml')

          for filepath in files:
              with open(filepath, encoding='utf-8') as f:
                  rule = yaml.safe_load(f)

              if not rule or 'id' not in rule:
                  print(f"⚠️ Skipping {filepath} - no 'id'")
                  continue

              alert_id = rule['id']
              title = rule.get('title', alert_id)
              search = rule.get('splunk_query', '').strip()

              if not search:
                  print(f"⚠️ Skipping {title} - no splunk_query")
                  continue

              severity = rule.get('severity', 'medium').lower()
              sev_map = {'low': '2', 'medium': '3', 'high': '4', 'critical': '5'}
              splunk_sev = sev_map.get(severity, '3')

              payload = {
                  'name': alert_id,
                  'search': search,
                  'description': rule.get('description', f"GitHub Rule: {title}"),
                  'cron_schedule': '*/5 * * * *',
                  'dispatch.earliest_time': '-60m',
                  'dispatch.latest_time': 'now',
                  'alert.track': '1',
                  'alert.severity': splunk_sev,
                  'is_scheduled': '1',
                  'alert.condition': 'number of results > 0',
                  'disabled': '0'
              }

              # Update cəhd et
              update_url = f"{base_url}/saved/searches/{alert_id}"
              r = requests.post(update_url, auth=auth, data=payload, verify=False)

              if r.status_code == 404:
                  # Yeni yarat
                  create_url = f"{base_url}/saved/searches"
                  r = requests.post(create_url, auth=auth, data=payload, verify=False)

              if r.status_code in (200, 201):
                  print(f"✅ Success → {title} ({alert_id})")
              else:
                  print(f"❌ Failed → {title} | Status: {r.status_code} | {r.text[:300]}")
          PYTHON
