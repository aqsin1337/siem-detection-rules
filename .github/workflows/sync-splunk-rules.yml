name: Sync Splunk Rules from GitHub

on:
  push:
    paths:
      - 'splunk/WS*.yml'
  workflow_dispatch:

jobs:
  sync-to-splunk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync Rules to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          python - << 'EOF'
import os, yaml, requests, glob, sys
from requests.auth import HTTPBasicAuth

host = os.getenv('SPLUNK_HOST')
user = os.getenv('SPLUNK_USERNAME')
pwd  = os.getenv('SPLUNK_PASSWORD')

APP_CONTEXT = "search"     # <<< BURANI DƏYİŞDİR! (SIEM, search, və ya sənin app adın)

if not all([host, user, pwd]):
    print("❌ Secrets tapılmadı!")
    sys.exit(1)

auth = HTTPBasicAuth(user, pwd)
base_url = f"https://{host}/servicesNS/nobody/{APP_CONTEXT}"

files = glob.glob('splunk/WS*.yml')
print(f"Tapılan fayl: {len(files)}\n")

for filepath in files:
    try:
        with open(filepath, encoding='utf-8') as f:
            rule = yaml.safe_load(f)

        alert_id = str(rule.get('id', '')).strip()
        title    = rule.get('title', alert_id)
        search   = str(rule.get('splunk_query', '')).strip()

        if not alert_id or not search:
            print(f"⚠️ Atlanır: {filepath}")
            continue

        payload = {
            'name': alert_id,
            'search': search,
            'description': f"GitHub Sync - {title}",
            'cron_schedule': '*/10 * * * *',
            'dispatch.earliest_time': '-60m',
            'dispatch.latest_time': 'now',
            'is_scheduled': '1',
            'alert.track': '1',
            'alert.condition': 'number of results > 0',
            'disabled': '0',
            'alert.suppress': '0'
        }

        print(f"🔄 {title} ({alert_id}) işlənir...")

        # Update cəhdi
        r = requests.post(f"{base_url}/saved/searches/{alert_id}", auth=auth, data=payload, verify=False, timeout=30)

        if r.status_code in (200, 201):
            print(f"✅ UĞURLU: {title}\n")
            continue

        # Create cəhdi
        r = requests.post(f"{base_url}/saved/searches", auth=auth, data=payload, verify=False, timeout=30)

        if r.status_code in (200, 201):
            print(f"✅ UĞURLU (yeni yaradıldı): {title}\n")
        else:
            print(f"❌ XƏTA: {title} | Status: {r.status_code}")
            print(f"Cavab: {r.text[:600]}\n")

    except Exception as e:
        print(f"❌ Xəta ({filepath}): {e}\n")

print("Bitdi.")
EOF
