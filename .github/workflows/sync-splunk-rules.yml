name: Sync Splunk Rules from GitHub

on:
  push:
    paths:
      - 'splunk/WS*.yml'
  workflow_dispatch:

jobs:
  sync-to-splunk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync Rules to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          python - << 'EOF'
import os
import yaml
import requests
import glob
import sys
from requests.auth import HTTPBasicAuth

host = os.getenv('SPLUNK_HOST')
user = os.getenv('SPLUNK_USERNAME')
pwd = os.getenv('SPLUNK_PASSWORD')

# ←←← BURANI DƏYİŞDİR !!!
APP_CONTEXT = "search"          # Əgər işləmirsə, "SIEM" və ya öz app adını yaz

if not all([host, user, pwd]):
    print("❌ XƏTA: SPLUNK_HOST, USERNAME və ya PASSWORD secret-ləri tapılmadı!")
    sys.exit(1)

auth = HTTPBasicAuth(user, pwd)
base_url = f"https://{host}/servicesNS/nobody/{APP_CONTEXT}"

files = glob.glob('splunk/WS*.yml')
print(f"✅ Tapılan rule sayı: {len(files)}\n")

success = 0
failed = 0

for filepath in files:
    try:
        with open(filepath, 'r', encoding='utf-8') as f:
            rule = yaml.safe_load(f)

        if not rule or 'id' not in rule or 'splunk_query' not in rule:
            print(f"⚠️ Atlanır: {filepath}")
            continue

        alert_id = str(rule['id']).strip()
        title = rule.get('title', alert_id)
        search = str(rule['splunk_query']).strip()

        if not search:
            print(f"⚠️ Query boşdur: {title}")
            continue

        payload = {
            'name': alert_id,
            'search': search,
            'description': f"GitHub Auto Sync - {title}",
            'cron_schedule': '*/10 * * * *',
            'dispatch.earliest_time': '-60m',
            'dispatch.latest_time': 'now',
            'is_scheduled': '1',
            'alert.track': '1',
            'alert.condition': 'number of results > 0',
            'disabled': '0',
            'alert.suppress': '0',
            'action.email': '0'
        }

        print(f"🔄 İşlənir → {title} (ID: {alert_id})")

        # 1. Mövcudluğu yoxla (GET)
        check_url = f"{base_url}/saved/searches/{alert_id}"
        check = requests.get(check_url, auth=auth, verify=False, timeout=20)

        if check.status_code == 200:
            # Update et
            r = requests.post(check_url, auth=auth, data=payload, verify=False, timeout=30)
            action = "update"
        else:
            # Create et
            r = requests.post(f"{base_url}/saved/searches", auth=auth, data=payload, verify=False, timeout=30)
            action = "create"

        if r.status_code in (200, 201):
            print(f"✅ UĞURLU ({action}): {title}\n")
            success += 1
        else:
            print(f"❌ XƏTA ({action}): {title}")
            print(f"   Status: {r.status_code}")
            print(f"   Cavab: {r.text[:800]}\n")
            failed += 1

    except Exception as e:
        print(f"❌ Python xətası ({filepath}): {e}\n")
        failed += 1

print("=" * 70)
print(f"🎯 NƏTİCƏ → Uğurlu: {success} | Xətalı: {failed}")
if failed == 0 and success > 0:
    print("✅ Bütün rule-lar uğurla sinxronlaşdırıldı!")
else:
    print("⚠️ Xətalar var. Yuxarıdakı loga bax.")
EOF
