name: Sync Splunk Rules

on:
  push:
    paths:
      - 'splunk/WS*.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          echo "Workflow started"
          echo "Host: $SPLUNK_HOST"
          echo "User: $SPLUNK_USERNAME"
          echo "Trying to sync rules..."
          ls -la splunk/
